
<style>
@media (prefers-reduced-motion: no-preference) {
  .flow-air   { stroke-dasharray:7 5; animation: fd 2s linear infinite; }
  .flow-hot   { stroke-dasharray:7 5; animation: fd 1.5s linear infinite; }
  .flow-exh   { stroke-dasharray:7 5; animation: fd 1.2s linear infinite; }
  @keyframes fd { to { stroke-dashoffset:-24; } }
  .p1a { animation: p1 1.2s ease-in-out infinite; }
  .p2a { animation: p2 1.2s ease-in-out infinite 0.4s; }
  .p3a { animation: p3 1.2s ease-in-out infinite 0.8s; }
  @keyframes p1 { 0%,100%{transform:translateY(0)} 50%{transform:translateY(16px)} }
  @keyframes p2 { 0%,100%{transform:translateY(10px)} 50%{transform:translateY(-5px)} }
  @keyframes p3 { 0%,100%{transform:translateY(5px)} 50%{transform:translateY(20px)} }
  .spin-c { animation: spn 0.7s linear infinite; transform-origin: 115px 286px; }
  .spin-t { animation: spn 0.7s linear infinite reverse; transform-origin: 115px 326px; }
  @keyframes spn { to { transform:rotate(360deg); } }
  .leak-puff { animation: puff 1.3s ease-in-out infinite; }
  @keyframes puff { 0%,100%{opacity:0;transform:scale(0.5) translate(0,0)} 60%{opacity:0.8;transform:scale(1.4) translate(3px,-10px)} }
  .ef-wave { animation: wave 2s ease-in-out infinite; }
  @keyframes wave { 0%,100%{opacity:0.3} 50%{opacity:0.9} }
}
.zone-btn { cursor:pointer; font-size:12px; font-weight:500; border:none; border-radius:6px; padding:6px 14px; transition:opacity 0.2s; }
.zone-btn:hover { opacity:0.8; }
.sim-btn { cursor:pointer; font-size:12px; font-weight:500; border:none; border-radius:6px; padding:7px 16px; }
.out-badge { display:inline-flex; align-items:center; gap:6px; padding:5px 12px; border-radius:6px; font-size:12px; font-weight:500; }
</style>

<!-- OUTPUT PANEL -->
<div id="out-panel" style="display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;padding:10px;border-radius:8px;border:1px solid #2a2820;background:#1a1a18;min-height:44px;align-items:center">
  <span style="font-size:12px;color:#5a5850">LeakSense output:</span>
  <span id="out-flag" class="out-badge" style="background:#2a2820;color:#5a5850;border:1px solid #3a3830">Flag: —</span>
  <span id="out-conf" class="out-badge" style="background:#2a2820;color:#5a5850;border:1px solid #3a3830">Confidence: —</span>
  <span id="out-loc"  class="out-badge" style="background:#2a2820;color:#5a5850;border:1px solid #3a3830">Zone: —</span>
  <span id="out-act"  class="out-badge" style="background:#2a2820;color:#5a5850;border:1px solid #3a3830">Action: —</span>
</div>

<script>
const twinState = {1:false, 2:false, 3:false};
const twinIds = {1:'z1', 2:'z2', 3:'z3'};
const twinColors = {1:'#1D9E75', 2:'#378ADD', 3:'#E24B4A'};
const btnIds = {1:'btn1', 2:'btn2', 3:'btn3'};

function toggleTwin(n) {
  twinState[n] = !twinState[n];
  const el = document.getElementById(twinIds[n]);
  el.style.opacity = twinState[n] ? '0.12' : '0';
  const btn = document.getElementById(btnIds[n]);
  btn.style.outline = twinState[n] ? '2px solid ' + twinColors[n] : 'none';
}
function toggleAll() {
  const anyOn = Object.values(twinState).some(v => v);
  [1,2,3].forEach(n => { if(anyOn === twinState[n]) toggleTwin(n); });
}

const leakData = {
  A: { twin:'Twin 1 — Intake', flag:'FAIL', conf:'91%', loc:'Zone A', act:'Inspect MAF–compressor pipe', color:'#378ADD' },
  B: { twin:'Twin 2 — Charge air', flag:'FAIL', conf:'88%', loc:'Zone B', act:'Check compressor–CAC hose', color:'#378ADD' },
  C: { twin:'Twin 2 — Charge air', flag:'FAIL', conf:'93%', loc:'Zone C', act:'Inspect CAC–manifold joint', color:'#1D9E75' },
  D: { twin:'Twin 3 — Exhaust', flag:'FAIL', conf:'87%', loc:'Zone D', act:'Check exhaust manifold gasket', color:'#E24B4A' },
  E: { twin:'Twin 3 — Exhaust', flag:'FAIL', conf:'90%', loc:'Zone E', act:'Inspect turbine–DOC pipe', color:'#E24B4A' },
};

let activeLeak = null;
function simLeak(zone) {
  clearLeak();
  activeLeak = zone;
  document.getElementById('leak-'+zone).style.opacity = '1';
  document.getElementById('ef-wave').style.opacity = '1';
  const d = leakData[zone];
  document.getElementById('out-flag').textContent = 'Flag: ' + d.flag;
  document.getElementById('out-flag').style.cssText = 'background:#3a0a0a;color:#f09595;border:1px solid #E24B4A;display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:6px;font-size:12px;font-weight:500';
  document.getElementById('out-conf').textContent = 'Confidence: ' + d.conf;
  document.getElementById('out-conf').style.cssText = 'background:#2a1a0a;color:#FAC775;border:1px solid #f5a800;display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:6px;font-size:12px;font-weight:500';
  document.getElementById('out-loc').textContent = 'Zone: ' + d.loc;
  document.getElementById('out-loc').style.cssText = 'background:#0a2a1a;color:#5DCAA5;border:1px solid #1D9E75;display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:6px;font-size:12px;font-weight:500';
  document.getElementById('out-act').textContent = 'Action: ' + d.act;
  document.getElementById('out-act').style.cssText = 'background:#26215C;color:#CECBF6;border:1px solid #7F77DD;display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:6px;font-size:12px;font-weight:500';
}
function clearLeak() {
  ['A','B','C','D','E'].forEach(z => { document.getElementById('leak-'+z).style.opacity = '0'; });
  document.getElementById('ef-wave').style.opacity = '0';
  activeLeak = null;
  ['out-flag','out-conf','out-loc','out-act'].forEach(id => {
    const el = document.getElementById(id);
    el.style.cssText = 'background:#2a2820;color:#5a5850;border:1px solid #3a3830;display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:6px;font-size:12px;font-weight:500';
  });
  document.getElementById('out-flag').textContent = 'Flag: —';
  document.getElementById('out-conf').textContent = 'Confidence: —';
  document.getElementById('out-loc').textContent = 'Zone: —';
  document.getElementById('out-act').textContent = 'Action: —';
}
</script>
